<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — {{ site_title }}</title>
    <meta name="description" content="{{ excerpt }}">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ excerpt }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ site_url }}/posts/{{ slug }}/">
    <link rel="canonical" href="{{ site_url }}/posts/{{ slug }}/">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 15px;
        }

        body {
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            background: #ffffff;
            color: #000000;
            line-height: 1.6;
            border: 4px solid #000000;
            min-height: 100vh;
        }

        /* --- Header --- */
        .post-header {
            padding: 2rem 2rem 1.5rem;
            border-bottom: 4px solid #000000;
        }

        .post-meta {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
        }

        .post-meta span::before {
            content: "[";
        }
        .post-meta span::after {
            content: "]";
        }

        .post-title {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.15;
            text-transform: uppercase;
            margin-bottom: 1rem;
            word-break: break-word;
        }

        .post-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .post-tags span {
            font-size: 0.7rem;
            text-transform: uppercase;
            border: 2px solid #000000;
            padding: 0.15rem 0.5rem;
            font-weight: 700;
        }

        /* --- Content --- */
        .post-content {
            padding: 2rem;
            max-width: 72ch;
        }

        .post-content p {
            margin-bottom: 1.2rem;
        }

        .post-content h2 {
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            margin: 3rem 0 0.8rem;
            padding-top: 1.5rem;
            border-top: 2px solid #000000;
        }

        .post-content h3 {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            margin: 2rem 0 0.6rem;
        }

        .post-content h4 {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            margin: 1.5rem 0 0.5rem;
            text-decoration: underline;
        }

        .post-content a {
            color: #000000;
            text-decoration: none;
            border-bottom: 2px solid #000000;
            font-weight: 700;
        }

        .post-content a:hover {
            background: #000000;
            color: #ffffff;
        }

        .post-content blockquote {
            border-left: 4px solid #000000;
            padding: 0.8rem 1rem;
            margin: 1.5rem 0;
            background: #f0f0f0;
        }

        .post-content blockquote p {
            margin-bottom: 0.4rem;
        }

        .post-content blockquote p:last-child {
            margin-bottom: 0;
        }

        .post-content ul, .post-content ol {
            padding-left: 2rem;
            margin-bottom: 1.2rem;
        }

        .post-content li {
            margin-bottom: 0.3rem;
        }

        .post-content code {
            font-family: inherit;
            background: #f0f0f0;
            border: 1px solid #cccccc;
            padding: 1px 4px;
            font-size: 0.9rem;
        }

        .post-content pre {
            background: #000000;
            color: #ffffff;
            padding: 1.5rem;
            margin: 1.5rem 0;
            overflow-x: auto;
            border: none;
        }

        .post-content pre code {
            background: none;
            border: none;
            color: inherit;
            padding: 0;
        }

        .post-content img {
            max-width: 100%;
            height: auto;
            border: 4px solid #000000;
            margin: 1.5rem 0;
        }

        .post-content hr {
            border: none;
            border-top: 4px solid #000000;
            margin: 2.5rem 0;
        }

        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.85rem;
        }

        .post-content th, .post-content td {
            border: 2px solid #000000;
            padding: 0.5rem;
            text-align: left;
        }

        .post-content th {
            font-weight: 700;
            text-transform: uppercase;
            background: #000000;
            color: #ffffff;
        }

        .post-content em {
            font-style: italic;
        }

        .post-content strong {
            font-weight: 700;
        }

        /* --- Footer --- */
        .post-footer {
            padding: 1.5rem 2rem;
            border-top: 4px solid #000000;
        }

        .post-footer a {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #000000;
            text-decoration: none;
            border: 2px solid #000000;
            padding: 0.4rem 0.8rem;
            display: inline-block;
            transition: all 0.1s;
        }

        .post-footer a:hover {
            background: #000000;
            color: #ffffff;
        }

        /* --- Responsive --- */
        @media (max-width: 640px) {
            body { border-width: 3px; }
            .post-header { padding: 1.5rem; }
            .post-content { padding: 1.5rem; }
            .post-title { font-size: 1.5rem; }
            .post-footer { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <article>
        <header class="post-header">
            <div class="post-meta">
                <span><time datetime="{{ date_iso }}">{{ date }}</time></span>
                <span>{{ reading_time }} min</span>
            </div>
            <h1 class="post-title">{{ title }}</h1>
            {% if tags %}
            <div class="post-tags">
                {% for tag in tags %}
                <span>{{ tag }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </header>

        <div class="post-content">
            {{ content }}
        </div>
    </article>

    <footer class="post-footer">
        <a href="{{ site_url }}/posts/">← All Posts</a>
    </footer>
</body>
</html>
