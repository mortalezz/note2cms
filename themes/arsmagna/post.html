<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - {{ site_title }}</title>
    <meta name="description" content="{{ excerpt }}">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ excerpt }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ site_url }}/posts/{{ slug }}/">
    <style>
        :root {
            --paper: #f8f1e2;
            --ink: #2f2a24;
            --muted: #6e6257;
            --accent: #b5452c;
            --accent-2: #d4a04f;
            --rule: #d8c7a9;
            --max-width: 760px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Cormorant Garamond", "Georgia", serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.75;
        }
        .wrap { max-width: var(--max-width); margin: 0 auto; padding: 54px 22px; }
        .meta { color: var(--muted); font-size: 0.95rem; }
        h1 { margin: 8px 0 14px; font-size: clamp(2rem, 5vw, 2.8rem); color: var(--accent); }
        .tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 22px; }
        .tags span {
            font-size: 0.78rem;
            color: var(--accent);
            border: 1px solid var(--accent-2);
            border-radius: 999px;
            padding: 2px 10px;
            background: #fff4df;
        }
        article {
            background: #fffaf1;
            border: 1px solid var(--rule);
            border-radius: 10px;
            padding: 24px;
        }
        article a { color: var(--accent); }
        article pre {
            border: 1px solid var(--rule);
            padding: 14px;
            overflow-x: auto;
            background: #fef4df;
        }
        article code { background: #fef4df; border: 1px solid var(--rule); padding: 1px 6px; }
        .back { display: inline-block; margin-top: 24px; color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="meta">{{ date }} • {{ reading_time }} min read</div>
        <h1>{{ title }}</h1>
        {% if tags %}
        <div class="tags">
            {% for tag in tags %}
            <span>{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}
        <article>{{ content }}</article>
        <a class="back" href="{{ site_url }}/posts/">← All posts</a>
    </main>
</body>
</html>
