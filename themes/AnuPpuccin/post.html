<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - {{ site_title }}</title>
    <meta name="description" content="{{ excerpt }}">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ excerpt }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ site_url }}/posts/{{ slug }}/">
    <style>
        :root {
            --bg: #11111b;
            --surface: #1e1e2e;
            --surface-2: #313244;
            --text: #cdd6f4;
            --muted: #a6adc8;
            --accent: #cba6f7;
            --accent-2: #89b4fa;
            --rule: #45475a;
            --radius: 14px;
            --max-width: 760px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", sans-serif;
            background: radial-gradient(circle at top right, #181825, var(--bg));
            color: var(--text);
            line-height: 1.75;
        }
        .wrap { max-width: var(--max-width); margin: 0 auto; padding: 52px 20px; }
        .meta { color: var(--muted); font-size: 0.9rem; }
        h1 { margin: 8px 0 14px; font-size: clamp(2rem, 5vw, 2.8rem); letter-spacing: -0.02em; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 24px; }
        .tags span {
            font-size: 0.75rem;
            color: var(--accent);
            border: 1px solid var(--accent-2);
            border-radius: 999px;
            padding: 2px 10px;
        }
        article {
            background: color-mix(in srgb, var(--surface) 88%, black);
            border: 1px solid var(--rule);
            border-radius: var(--radius);
            padding: 24px;
        }
        article a { color: var(--accent-2); }
        article h2, article h3 { line-height: 1.3; }
        article pre {
            background: #181825;
            border: 1px solid var(--surface-2);
            border-radius: 10px;
            padding: 14px;
            overflow-x: auto;
        }
        article code {
            background: #181825;
            border: 1px solid var(--surface-2);
            border-radius: 6px;
            padding: 1px 6px;
        }
        .back { display: inline-block; margin-top: 24px; color: var(--accent-2); text-decoration: none; }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="meta">{{ date }} • {{ reading_time }} min read</div>
        <h1>{{ title }}</h1>
        {% if tags %}
        <div class="tags">
            {% for tag in tags %}
            <span>{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}
        <article>{{ content }}</article>
        <a class="back" href="{{ site_url }}/posts/">← All posts</a>
    </main>
</body>
</html>
